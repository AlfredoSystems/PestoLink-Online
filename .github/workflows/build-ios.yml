name: Build iOS

on:
  workflow_dispatch:
    inputs:
      configuration:
        description: Build configuration
        required: true
        default: Debug
        type: choice
        options: [Debug, Release]

# To sign for real-device distribution, add these secrets to your repo:
#   APPLE_CERTIFICATE_BASE64  – base64-encoded .p12 certificate
#   APPLE_CERTIFICATE_PASSWORD – certificate password
#   APPLE_PROVISIONING_PROFILE – base64-encoded .mobileprovision
# Then uncomment and adapt the "Import certificates" step below.

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Add iOS platform
        run: npx cap add ios

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Install CocoaPods dependencies
        working-directory: ios/App
        run: pod install

      # Uncomment to sign with a real certificate:
      # - name: Import certificate and provisioning profile
      #   env:
      #     CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
      #     CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      #     PROVISIONING_PROFILE: ${{ secrets.APPLE_PROVISIONING_PROFILE }}
      #   run: |
      #     echo "$CERTIFICATE_BASE64" | base64 --decode > cert.p12
      #     security create-keychain -p "" build.keychain
      #     security import cert.p12 -k build.keychain -P "$CERTIFICATE_PASSWORD" -A
      #     security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain
      #     security default-keychain -s build.keychain
      #     security unlock-keychain -p "" build.keychain
      #     mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
      #     echo "$PROVISIONING_PROFILE" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision

      - name: Build (simulator, unsigned)
        run: |
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration ${{ inputs.configuration }} \
            -sdk iphonesimulator \
            -derivedDataPath ios/build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - uses: actions/upload-artifact@v4
        with:
          name: pestolink-ios-${{ inputs.configuration }}-${{ github.sha }}
          path: ios/build/Build/Products/${{ inputs.configuration }}-iphonesimulator/App.app
          retention-days: 30
