name: Deploy Android to Google Play

# Secrets required:
#   ANDROID_KEYSTORE_BASE64  – base64-encoded release keystore
#                              PowerShell: keytool -genkey -v -keystore pestolink-release.keystore -alias pestolink -keyalg RSA -keysize 2048 -validity 10000
#                              PowerShell: [Convert]::ToBase64String([IO.File]::ReadAllBytes("pestolink-release.keystore")) | clip
#   ANDROID_STORE_PASSWORD   – keystore password
#   ANDROID_KEY_ALIAS        – pestolink
#   ANDROID_KEY_PASSWORD     – key password

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: VITE_BUILD_NUMBER=$(git rev-list --count HEAD) npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Generate app icons
        run: npm run cap:icons

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: python3 -c "import base64,os; open('release.keystore','wb').write(base64.b64decode(os.environ['KEYSTORE_BASE64']))"

      - name: Fix gradlew permissions
        run: chmod +x android/gradlew

      - name: Build release APK and AAB
        working-directory: android
        env:
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          VERSION_CODE=$(git rev-list --count HEAD)
          sed -i "s/versionCode [0-9]*/versionCode $VERSION_CODE/" app/build.gradle
          grep "versionCode" app/build.gradle
          ./gradlew assembleRelease bundleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/../release.keystore \
            -Pandroid.injected.signing.store.password="$ANDROID_STORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$ANDROID_KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$ANDROID_KEY_PASSWORD"

      - uses: actions/upload-artifact@v4
        with:
          name: pestolink-apk-${{ github.sha }}
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      - uses: actions/upload-artifact@v4
        with:
          name: pestolink-aab-${{ github.sha }}
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Upload to Google Play (Internal Testing)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.alfredosys.pestolink
          releaseFiles: android/app/build/outputs/bundle/release/app-release.aab
          track: internal
