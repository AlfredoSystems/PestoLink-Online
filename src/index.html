<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover">
    <link rel="shortcut icon" type="image/x-icon" href="./favicon.ico">

    <title>PestoLink-Online</title>
    <link rel="stylesheet" href="./styles.css">
    <script>var _t=localStorage.getItem('color-theme')||'system';if(_t==='system')_t=window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light';document.documentElement.setAttribute('data-theme',_t);</script>
</head>

<body>
    <script>
        if(localStorage.getItem('toggle-mobile-layout')==='true')document.body.classList.add('mobile-mode');
        if(localStorage.getItem('toggle-terminal')==='true')document.body.classList.add('terminal-visible');
    </script>

    <div id="ble-warning-banner">
        <div id="ble-warning-content">
            <strong id="ble-warning-message"></strong>
            <span id="ble-warning-detail"></span>
        </div>
        <button id="ble-warning-close">&times;</button>
    </div>

    <button id="refresh-button" class="floating-button">🔄</button>
    <button id="gamepad-select-button" class="floating-button">🎮</button>
    <button id="settings-button" class="floating-button">⚙️</button>

    <div id="user-container">
        <div class="container" id="left-panel"></div>

        <div class="container" id="interface">
            <button id="ble-button">🔗</button>
            <button id="telemetry">no data</button>
            <button id="ble-status">not connected</button>

            <div id="settings-grid">

                <div class="settings-label">Mobile Layout</div>

                <div class="settings-toggle">
                    <div id="toggle-mobile-layout" class="toggle-round"><div class="toggle-nub"></div></div>
                </div>

                <div class="settings-label">Terminal</div>

                <div class="settings-toggle">
                    <div id="toggle-terminal" class="toggle-round"><div class="toggle-nub"></div></div>
                </div>

            </div>

        </div>

        <div class="container" id="right-panel"></div>
    </div>

    <div id="terminal-container">
        <button id="terminal-clear-button">🧹</button>
        <button id="terminal-lock-button">🔓</button>
        <div id="terminal-log"></div>
    </div>

    <div id="gamepad-modal" class="modal">
        <div class="modal-content">
            <span class="close-button">&times;</span>
            <h2>Select Gamepad</h2>
            <ul id="gamepad-list">
            </ul>
        </div>
    </div>

    <div id="ble-picker-modal" class="modal">
        <div class="modal-content">
            <span id="ble-picker-close" class="close-button">&times;</span>
            <h2>Connect to Robot</h2>
            <p id="ble-picker-status"></p>
            <ul id="ble-picker-list"></ul>
        </div>
    </div>

    <div id="settings-modal" class="modal">
        <div class="modal-content">
            <span id="settings-close" class="close-button">&times;</span>
            <h2>Settings</h2>
            <div class="modal-setting">
                <div class="settings-label">Color Mode</div>
                <div class="theme-slider">
                    <div class="theme-option" data-value="light">☀️ Light</div>
                    <div class="theme-option" data-value="system">🖥 Auto</div>
                    <div class="theme-option" data-value="dark">🌙 Dark</div>
                </div>
            </div>
            <hr class="modal-divider">
            <div class="modal-setting">
                <div class="settings-label">Override joystick values with keyboard</div>
                <div class="settings-toggle">
                    <div id="toggle-keyboard-style" class="toggle-round"><div class="toggle-nub"></div></div>
                </div>
            </div>
            <hr class="modal-divider">
            <div class="modal-setting">
                <div class="settings-label">Zero on focus loss</div>
                <div class="settings-toggle">
                    <div id="toggle-focus-zero" class="toggle-round"><div class="toggle-nub"></div></div>
                </div>
            </div>
            <hr class="modal-divider">
            <div class="modal-setting">
                <div class="settings-label">Left card (mobile layout)</div>
                <select id="select-card-left" class="card-select"></select>
            </div>
            <hr class="modal-divider">
            <div class="modal-setting">
                <div class="settings-label">Right card (mobile layout)</div>
                <select id="select-card-right" class="card-select"></select>
            </div>
            <hr class="modal-divider">
            <a href="https://github.com/AlfredoSystems/PestoLink-Online" target="_blank" id="github-link">Help and Info ↗</a>
            <span id="app-version"></span>
        </div>
    </div>

    <div id="hack-spacer"></div>
    <script type="module" src="./index.js"></script>

</body>

</html>
